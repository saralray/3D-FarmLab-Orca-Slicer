name: Build and Upload Windows Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to (e.g. v2.5.0-dev)'
        required: true
        default: 'v2.5.0-dev'

# Allow the default GITHUB_TOKEN to upload assets to releases (otherwise the
# upload step fails with HTTP 403 "Resource not accessible by integration").
permissions:
  contents: write

jobs:
  build_windows:
    name: Build Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: 'false'

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v3

      - name: Install NSIS
        run: choco install nsis -y

      # Cache the dependency build under a release-owned key (NOT the shared main-CI
      # key): OpenCV's installed OpenCVConfig picks its vcNN runtime by the MSVC that
      # BUILT it, so a cache built by a runner with a different MSVC fails config with
      # "OpenCV ... no binaries compatible" (resolves vc14). Building deps here ties
      # the cache to this workflow's own runner toolchain; a cache miss just rebuilds
      # deps fresh (same as the original full build) and re-saves.
      #
      # Key hashes only the dependency DEFINITION files (manifests + per-package
      # recipes), NOT 'deps/**': the post-job cache-save re-evaluates this key after
      # deps/build is populated (~187k artifact files), and hashFiles('deps/**') over
      # that times out (>120s), failing the job even though the build succeeded.
      - name: Restore dependency cache
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/deps/build/OrcaSlicer_dep
          key: windows-release-deps-${{ hashFiles('deps/CMakeLists.txt', 'deps/deps-*.cmake', 'deps/*/*.cmake') }}

      - name: Build dependencies (cache miss only)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}
        run: .\build_release_vs.bat deps

      - name: Build slicer
        working-directory: ${{ github.workspace }}
        run: .\build_release_vs.bat slicer

      - name: Create installer
        working-directory: ${{ github.workspace }}/build
        run: cpack -G NSIS

      - name: Pack portable zip
        working-directory: ${{ github.workspace }}/build
        shell: cmd
        run: '"C:/Program Files/7-Zip/7z.exe" a -tzip OrcaSlicer_Windows_portable.zip "${{ github.workspace }}/build/OrcaSlicer"'

      - name: Rename artifacts
        shell: bash
        run: |
          ver_pure=$(grep 'set(SoftFever_VERSION' version.inc | cut -d '"' -f2)
          tag="${{ github.event.inputs.release_tag }}"
          installer=$(ls ./build/OrcaSlicer*.exe | head -n1)
          mv "$installer" "./build/3D-FarmLab-OrcaSlicer-${tag}-win64-installer.exe"
          mv ./build/OrcaSlicer_Windows_portable.zip "./build/3D-FarmLab-OrcaSlicer-${tag}-win64-portable.zip"
          echo "INSTALLER=./build/3D-FarmLab-OrcaSlicer-${tag}-win64-installer.exe" >> $GITHUB_ENV
          echo "PORTABLE=./build/3D-FarmLab-OrcaSlicer-${tag}-win64-portable.zip" >> $GITHUB_ENV

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.release_tag }}" \
            "${{ env.INSTALLER }}" \
            "${{ env.PORTABLE }}" \
            --repo "${{ github.repository }}" \
            --clobber
