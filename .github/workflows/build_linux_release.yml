name: Build and Upload Linux Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to (e.g. v2.5.0-dev)'
        required: true
        default: 'v2.5.0-dev'

# Allow the default GITHUB_TOKEN to upload assets to releases (otherwise the
# upload step fails with HTTP 403 "Resource not accessible by integration").
permissions:
  contents: write

jobs:
  build_linux:
    name: Build Linux AppImage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: 'false'

      - name: Install system dependencies
        run: |
          sudo ./build_linux.sh -ur

      # Reuse the dependency build cached by the main "Build all" CI (same key/path),
      # so deps (~1h) are restored instead of rebuilt. Uses the clang key, hence the
      # clang+lld build below (matches upstream nightlies and the cached deps' toolchain).
      - name: Restore dependency cache
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/deps/build/OrcaSlicer_dep
          key: linux-clang-cache-orcaslicer_deps-build-${{ hashFiles('deps/**') }}

      - name: Build dependencies (cache miss only)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          ./build_linux.sh -drlL

      - name: Build slicer and AppImage
        run: |
          ./build_linux.sh -isrlL

      - name: Rename AppImage
        run: |
          ver_pure=$(grep 'set(SoftFever_VERSION' version.inc | cut -d '"' -f2)
          app_name=$(grep 'set(SLIC3R_APP_NAME' version.inc | cut -d '"' -f2)
          arch=$(uname -m)
          src="./build/${app_name}_Linux_V${ver_pure}.AppImage"
          dst="./build/3D-FarmLab-OrcaSlicer-${{ github.event.inputs.release_tag }}-linux-${arch}.AppImage"
          mv "$src" "$dst"
          echo "APPIMAGE=$dst" >> $GITHUB_ENV
          echo "ARCH=${arch}" >> $GITHUB_ENV

      - name: Upload AppImage to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.release_tag }}" \
            "${{ env.APPIMAGE }}#3D-FarmLab-OrcaSlicer-${{ github.event.inputs.release_tag }}-linux-${{ env.ARCH }}.AppImage" \
            --repo "${{ github.repository }}" \
            --clobber
